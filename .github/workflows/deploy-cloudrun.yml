name: Deploy Cloud Run

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "infra/deploy_cloudrun.sh"
      - "infra/cloudbuild.yaml"
      - ".github/workflows/deploy-cloudrun.yml"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GOOGLE_CLOUD_PROJECT: ${{ vars.GCP_PROJECT_ID }}
      GOOGLE_CLOUD_LOCATION: ${{ vars.GCP_REGION }}
      CLOUDSQL_INSTANCE_CONNECTION_NAME: ${{ vars.CLOUDSQL_INSTANCE_CONNECTION_NAME }}
      SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE_NAME }}
      DB_USER: ${{ vars.DB_USER }}
      DB_NAME: ${{ vars.DB_NAME }}
      DB_PASSWORD_SECRET_NAME: ${{ vars.DB_PASSWORD_SECRET_NAME }}
      FIREBASE_SERVICE_ACCOUNT_JSON_SECRET_NAME: ${{ vars.FIREBASE_SERVICE_ACCOUNT_JSON_SECRET_NAME }}
      VISTA_FIREBASE_WEB_CONFIG_SECRET_NAME: ${{ vars.VISTA_FIREBASE_WEB_CONFIG_SECRET_NAME }}
      CLOUD_RUN_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT }}
      CLOUD_RUN_BUILD_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_BUILD_SERVICE_ACCOUNT }}
      FRONTEND_FEATURES_URI: ${{ vars.FRONTEND_FEATURES_URI }}
      ALLOW_UNAUTHENTICATED: ${{ vars.CLOUD_RUN_ALLOW_UNAUTHENTICATED }}
      VISTA_MODEL_ID: ${{ vars.VISTA_MODEL_ID }}
      VISTA_LOCATION: ${{ vars.VISTA_LOCATION }}
      VISTA_FALLBACK_LOCATION: ${{ vars.VISTA_FALLBACK_LOCATION }}
      VISTA_PROJECT_ID: ${{ vars.VISTA_PROJECT_ID }}
      VISTA_USE_ADK: ${{ vars.VISTA_USE_ADK }}
      VISTA_SESSION_COOKIE_SECURE: ${{ vars.VISTA_SESSION_COOKIE_SECURE }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_GITHUB_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: bash infra/deploy_cloudrun.sh
