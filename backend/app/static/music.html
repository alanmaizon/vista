<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Eurydice</title>
    <link rel="icon" href="/favicon.ico" type="image/svg+xml">
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body data-brand="Eurydice" data-domain="MUSIC">
    <main class="shell">
      <section class="panel stage-panel">
        <div class="stage-frame">
          <video id="preview" autoplay muted playsinline></video>
          <div class="stage-sheen" aria-hidden="true"></div>

          <div class="stage-topbar">
            <div class="status-card">
              <p class="status-brand">Eurydice</p>
              <p id="session-status" class="session-text" aria-live="polite">Hear. Read. Practice.</p>
              <p id="capture-hint" class="hint capture-text">Use audio for played phrases. Turn on camera for score reading and sheet framing.</p>
              <p id="camera-warning" class="hint warning" aria-live="polite"></p>
            </div>
            <span id="risk-badge" class="badge">NORMAL</span>
          </div>

          <div class="caption-shell">
            <div id="captions" class="captions overlay-captions" aria-live="polite"></div>
          </div>

          <div class="control-dock">
            <div class="media-actions" role="group" aria-label="Media controls">
              <button id="mic-toggle" class="secondary" type="button">Mic On</button>
              <button id="camera-toggle" class="secondary" type="button">Camera Off</button>
              <button id="screen-toggle" class="secondary" type="button">Share Screen Off</button>
              <button id="snapshot" class="secondary" type="button">Capture Screenshot</button>
            </div>
            <div class="action-row">
              <button id="start" class="primary action-button" type="button">Start session</button>
            </div>
          </div>
        </div>
      </section>

      <section class="panel setup-panel music-analysis-panel">
        <label for="score-line">Score line</label>
        <textarea
          id="score-line"
          rows="3"
          spellcheck="false"
          placeholder="C4/q D4/q E4/h | G4/q A4/q B4/h"
        ></textarea>
        <div id="music-flow-hint" class="music-flow-hint" aria-live="polite">
          Enter a score line, then use the main button to prepare and compare it.
        </div>
        <div id="music-analysis" class="hint" aria-live="polite">One-shot phrase transcription will appear here.</div>
        <div class="score-stage">
          <div id="score-render" class="score-render-surface hint" aria-live="polite">Rendered notation will appear here.</div>
          <div id="score-overlay" class="score-overlay is-hidden" aria-live="polite"></div>
        </div>
        <div id="score-note-strip" class="score-note-strip" aria-live="polite"></div>
      </section>

      <details class="dev-drawer-floating">
        <summary>Dev</summary>
        <section class="panel setup-panel">
          <div class="grid">
            <div class="stack">
              <label for="firebase-config">Firebase Config JSON</label>
              <textarea id="firebase-config" rows="6" spellcheck="false" placeholder='{"apiKey":"","authDomain":"","projectId":"","appId":""}'></textarea>

              <label for="email">Email (optional)</label>
              <input id="email" type="email" autocomplete="username">

              <label for="password">Password (optional)</label>
              <input id="password" type="password" autocomplete="current-password">

              <button id="sign-in" class="secondary" type="button">Sign In</button>
              <p id="auth-status" class="hint" aria-live="polite">Signed out.</p>
            </div>

            <div class="stack">
              <label for="mode">Music Skill</label>
              <select id="mode">
                <option value="GUIDED_LESSON" selected>GUIDED_LESSON</option>
                <option value="HEAR_PHRASE">HEAR_PHRASE</option>
                <option value="SHEET_FRAME_COACH">SHEET_FRAME_COACH</option>
                <option value="READ_SCORE">READ_SCORE</option>
                <option value="COMPARE_PERFORMANCE">COMPARE_PERFORMANCE</option>
                <option value="EAR_TRAIN">EAR_TRAIN</option>
                <option value="GENERATE_EXAMPLE">GENERATE_EXAMPLE</option>
              </select>

              <label for="goal">Goal</label>
              <input id="goal" type="text" placeholder="Identify the arpeggio I just played">
            </div>
          </div>
        </section>
      </details>

      <ul id="summary" class="summary is-hidden" hidden></ul>
    </main>

    <script type="module" src="/static/app.js"></script>
  </body>
</html>
