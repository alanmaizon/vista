options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _FRONTEND_DIR: frontend
  _API_BASE_URL: https://vista-ai-backend-en2ftwmt7q-uc.a.run.app
  _FIREBASE_PROJECT_ID: vista-ai-488623

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/vista-firebase-adminsdk/versions/latest
      env: FIREBASE_SERVICE_ACCOUNT_JSON

steps:
  - id: install-frontend-deps
    name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        cd "${_FRONTEND_DIR}"
        npm ci

  - id: build-frontend
    name: node:20
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        cd "${_FRONTEND_DIR}"
        VITE_API_BASE_URL="${_API_BASE_URL}" npm run build

  - id: deploy-firebase-hosting
    name: node:20
    entrypoint: bash
    secretEnv:
      - FIREBASE_SERVICE_ACCOUNT_JSON
    args:
      - -c
      - |
        set -euo pipefail
        SA_PATH="/workspace/firebase-adminsdk.json"
        printf '%s' "$$FIREBASE_SERVICE_ACCOUNT_JSON" > "$${SA_PATH}"
        export GOOGLE_APPLICATION_CREDENTIALS="$${SA_PATH}"

        npm install --global firebase-tools@13
        firebase deploy \
          --project="${_FIREBASE_PROJECT_ID}" \
          --only hosting \
          --non-interactive

        rm -f "$${SA_PATH}"
