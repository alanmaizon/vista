options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: us-central1
  _AR_REPO: ancient-greek-backend
  _RUNTIME_SA: tutor-runtime

steps:
  - id: enable-required-apis
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        gcloud services enable \
          run.googleapis.com \
          artifactregistry.googleapis.com \
          secretmanager.googleapis.com \
          cloudbuild.googleapis.com \
          iam.googleapis.com \
          serviceusage.googleapis.com \
          --project="${PROJECT_ID}"

  - id: ensure-artifact-registry-repo
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        if gcloud artifacts repositories describe "${_AR_REPO}" \
          --location="${_REGION}" \
          --project="${PROJECT_ID}" >/dev/null 2>&1; then
          echo "Artifact Registry repository ${_AR_REPO} already exists."
        else
          gcloud artifacts repositories create "${_AR_REPO}" \
            --repository-format=docker \
            --location="${_REGION}" \
            --description="Backend images for Ancient Greek Live Tutor" \
            --project="${PROJECT_ID}"
        fi

  - id: ensure-runtime-service-account
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        RUNTIME_SA_EMAIL="${_RUNTIME_SA}@${PROJECT_ID}.iam.gserviceaccount.com"
        if gcloud iam service-accounts describe "$${RUNTIME_SA_EMAIL}" \
          --project="${PROJECT_ID}" >/dev/null 2>&1; then
          echo "Runtime service account $${RUNTIME_SA_EMAIL} already exists."
        else
          gcloud iam service-accounts create "${_RUNTIME_SA}" \
            --display-name="Ancient Greek Tutor Runtime" \
            --project="${PROJECT_ID}"
        fi

  - id: ensure-gemini-secret
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        if gcloud secrets describe "TUTOR_GEMINI_API_KEY" \
          --project="${PROJECT_ID}" >/dev/null 2>&1; then
          echo "Secret TUTOR_GEMINI_API_KEY already exists."
        else
          gcloud secrets create "TUTOR_GEMINI_API_KEY" \
            --replication-policy=automatic \
            --project="${PROJECT_ID}"
        fi

  - id: grant-runtime-secret-access
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        RUNTIME_SA_EMAIL="${_RUNTIME_SA}@${PROJECT_ID}.iam.gserviceaccount.com"
        gcloud secrets add-iam-policy-binding "TUTOR_GEMINI_API_KEY" \
          --member="serviceAccount:$${RUNTIME_SA_EMAIL}" \
          --role="roles/secretmanager.secretAccessor" \
          --project="${PROJECT_ID}"
