substitutions:
  _FEATURES_URI: ""

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -lc
      - |
        set -euo pipefail
        if [ -z "${_FEATURES_URI}" ]; then
          echo "No private frontend asset URI configured; skipping feature sync."
          exit 0
        fi
        features_uri="${_FEATURES_URI}"
        features_uri="${features_uri%/}"
        if ! gcloud storage ls "${features_uri}" >/dev/null 2>&1; then
          echo "Private frontend asset URI is not readable: ${features_uri}" >&2
          echo "Check that the bucket path exists and that the build service account has roles/storage.objectViewer." >&2
          exit 1
        fi
        mkdir -p frontend/public/features
        gcloud storage cp --recursive "${features_uri}" frontend/public/
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - backend/Dockerfile
      - -t
      - ${_IMAGE}
      - .
images:
  - ${_IMAGE}
options:
  logging: CLOUD_LOGGING_ONLY
